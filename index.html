<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StudioForge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0c10;--bg2:#13141a;--bg3:#1a1b24;--bg4:#22232f;--border:#2a2b3a;--border2:#363748;--accent:#00d4ff;--accent2:#7c3aed;--accent3:#f59e0b;--green:#10b981;--red:#ef4444;--text:#e8e9f0;--text2:#9899ab;--text3:#5a5b6e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}.logo span{color:var(--accent2)}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.sec-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;text-align:center}
.wrap{width:100%;max-width:920px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.ch-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative}
.ch-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,255,.08)}
.ch-icon{width:60px;height:60px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid var(--border2)}
.ch-name{font-size:14px;font-weight:600;text-align:center}
.ch-sub{font-size:11px;color:var(--text3);text-align:center}
.ch-del{position:absolute;top:8px;left:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;opacity:0;transition:opacity .15s}
.ch-card:hover .ch-del{opacity:1}
.ch-del:hover{color:var(--red)}
.ch-eng{position:absolute;top:10px;right:10px}
.ch-add{background:var(--bg2);border:2px dashed var(--border2);border-radius:14px;padding:20px 16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:10px}
.ch-add:hover{border-color:var(--accent)}
.add-icon{width:60px;height:60px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text3)}
.ch-add:hover .add-icon,.ch-add:hover .add-txt{color:var(--accent)}
.add-txt{font-size:13px;color:var(--text3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:420px;max-width:95vw}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.5px}
label:first-child{margin-top:0}
input,select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Pretendard',sans-serif;outline:none}
input:focus,select:focus{border-color:var(--accent)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:6px}
.e-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.e-btn:hover,.e-btn.sel{border-color:var(--accent);background:rgba(0,212,255,.1)}
.btn-row{display:flex;gap:8px;margin-top:18px}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .15s}
.btn:hover{filter:brightness(1.1)}
.btn-p{background:var(--accent);color:#000;flex:1}
.btn-g{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700}
.bc{background:rgba(0,212,255,.15);color:var(--accent)}
.bv{background:rgba(124,58,237,.2);color:#a78bfa}
.ba{background:rgba(245,158,11,.15);color:var(--accent3)}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">STUDIO<span>FORGE</span></div>
</div>
<div class="main">
  <div class="wrap">
    <div class="sec-title">채널 선택</div>
    <div class="grid" id="grid"></div>
    <div style="text-align:center;font-size:12px;color:var(--text3)">채널을 선택하거나 새 채널을 만들어 시작하세요</div>
  </div>
</div>
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title">새 채널 만들기</div>
    <label>채널 아이콘</label>
    <div class="emoji-grid" id="emojiGrid"></div>
    <label>채널 이름</label>
    <input type="text" id="chName" placeholder="예: 경제탐사대">
    <label>생성 엔진</label>
    <select id="chEng">
      <option value="api">API (Gemini/ElevenLabs 등)</option>
      <option value="flow">Google Flow</option>
      <option value="both">둘 다</option>
    </select>
    <div class="btn-row">
      <button class="btn btn-p" onclick="createCh()">채널 만들기</button>
      <button class="btn btn-g" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>
<script>
const EMOJIS=['📺','📡','🎬','🎥','🎙','📰','💰','📊','🌍','🔬','🎮','🏆','🍔','✈️','🎨','🎵','🤖','⚡','🔥','💎','🚀','🌟','🦅','🐉'];
let selEmoji='📺';
function getChs(){try{return JSON.parse(localStorage.getItem('sf_channels')||'[]')}catch{return[]}}
function saveChs(c){localStorage.setItem('sf_channels',JSON.stringify(c))}
function render(){
  const chs=getChs(),grid=document.getElementById('grid');
  const eMap={api:'bc',flow:'bv',both:'ba'},eL={api:'API',flow:'Flow',both:'API+Flow'};
  grid.innerHTML=chs.map(c=>`
    <div class="ch-card" onclick="enter('${c.id}')">
      <button class="ch-del" onclick="event.stopPropagation();del('${c.id}')">✕</button>
      <div class="ch-icon">${c.icon}</div>
      <div class="ch-name">${c.name}</div>
      <div class="ch-eng"><span class="badge ${eMap[c.engine]||'bc'}">${eL[c.engine]||'API'}</span></div>
    </div>`).join('')+`
    <div class="ch-add" onclick="openModal()">
      <div class="add-icon">+</div><div class="add-txt">새 채널 추가</div>
    </div>`;
}
function openModal(){
  selEmoji='📺';
  document.getElementById('chName').value='';
  document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>`<button class="e-btn${e===selEmoji?' sel':''}" onclick="selE('${e}',this)">${e}</button>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function selE(e,btn){selEmoji=e;document.querySelectorAll('.e-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel')}
function createCh(){
  const name=document.getElementById('chName').value.trim();
  if(!name){alert('채널 이름을 입력하세요.');return;}
  const chs=getChs();
  chs.push({id:'ch_'+Date.now(),name,icon:selEmoji,engine:document.getElementById('chEng').value,createdAt:new Date().toISOString()});
  saveChs(chs);closeModal();render();
}
function del(id){
  if(!confirm('채널을 삭제할까요?'))return;
  saveChs(getChs().filter(c=>c.id!==id));
  localStorage.removeItem('sf_ch_'+id);render();
}
function enter(id){localStorage.setItem('sf_current_channel',id);window.location.href='studio.html'}
render();
</script>
</body>
</html>
